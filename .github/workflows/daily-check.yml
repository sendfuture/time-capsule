name: Hourly Time Capsule Checker

on:
  schedule:
    # এটি প্রতি ১ ঘণ্টা পর পর অটোমেটিক রান হবে ব্যাকএন্ডে চেক করার জন্য
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Firebase Dependency
      run: npm install firebase

    - name: Run Capsule Engine Script
      env:
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        FIREBASE_PROJECT_ID: "sendfuture-adaa7"
      run: node cron.js
