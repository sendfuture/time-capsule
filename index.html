<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSM | Neural Time Capsule Editor</title>
    <style>
        :root {
            --bg-color: #03030e;
            --card-bg: #070714;
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff007f;
            --text-color: #e0e0ff;
            --input-bg: #0f0f2d;
            --border-color: rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .terminal-container {
            width: 100%;
            max-width: 650px;
            background-color: var(--card-bg);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.15);
            position: relative;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .dots {
            display: flex;
            gap: 8px;
            margin-right: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }

        .title-bar {
            color: var(--neon-cyan);
            font-weight: bold;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--neon-magenta);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #00f2ff;
            border: none;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
            line-height: 1.5;
        }

        .status-success {
            background-color: rgba(39, 201, 63, 0.1);
            border: 1px solid #27c93f;
            color: #27c93f;
        }

        .status-error {
            background-color: rgba(255, 95, 86, 0.1);
            border: 1px solid #ff5f56;
            color: #ff5f56;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: #666688;
        }

        .symbol-bar {
            color: var(--neon-cyan);
            opacity: 0.6;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <!-- টার্মিনাল হেডার বাটনসমূহ -->
        <div class="terminal-header">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="title-bar">root@csm-core:~# send-future-letter</div>
        </div>

        <!-- মেইন ক্যাপসুল ফর্ম -->
        <form id="timeCapsuleForm">
            <div class="form-group">
                <label for="email">ইউজারের ইমেইল (TARGET MAIL)</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="templateType">চিঠির থিম (THEMING ARCHITECTURE)</label>
                <select id="templateType">
                    <option value="default">🌐 Default Neon Engine</option>
                    <option value="birthday">🎂 Future Birthday Pack</option>
                    <option value="love">❤️ Future Soulmate Ledger</option>
                    <option value="crypto">🪙 Crypto & Wealth Ledger</option>
                    <option value="target">🎯 Motivation & Target Core</option>
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="sendDate">পাঠানোর তারিখ (DATE)</label>
                    <input type="date" id="sendDate" required>
                </div>
                <div class="form-group">
                    <label for="sendTime">পাঠানোর সময় (TIME)</label>
                    <input type="time" id="sendTime" required>
                </div>
            </div>

            <div class="form-group">
                <label for="message">ভবিষ্যতের বার্তা (ENCRYPTED LETTER)</label>
                <textarea id="message" placeholder="আপনার ভবিষ্যতের জন্য কিছু লিখে রাখুন..." required></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                🚀 CAPSULE ENCRYPT & SAVE
            </button>
        </form>

        <!-- স্ট্যাটাস রেসপন্স বক্স -->
        <div id="statusBox" class="status-box"></div>

        <!-- সিস্টেম ফুটার এবং সিম্বল বার -->
        <div class="footer">
            <div class="symbol-bar">⚙️ ─── 💾 ─── 🔑 ─── ⏳ ─── 🔒 ─── 🛰️</div>
            <p>System Maintained by <span style="color: var(--neon-cyan);">সিএসএম মহসিন আলম</span></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('timeCapsuleForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // বাটন ডিজেবল ও লোডিং স্টেট তৈরি
            submitBtn.disabled = true;
            submitBtn.innerText = "⚡ LOCKING CAPSULE...";
            statusBox.style.display = "none";

            // টাইম ইনপুট স্প্লিট করে আওয়ার এবং মিনিট আলাদা করা
            const timeInput = document.getElementById('sendTime').value;
            const [sendHour, sendMinute] = timeInput.split(':');

            const data = {
                email: document.getElementById('email').value,
                templateType: document.getElementById('templateType').value,
                sendDate: document.getElementById('sendDate').value,
                sendHour: sendHour,
                sendMinute: sendMinute,
                message: document.getElementById('message').value
            };

            try {
                // নেটলিফাই ব্যাকএন্ডে হিট করা
                const response = await fetch('https://f.futurebd.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        statusBox.className = "status-box status-success";
                        statusBox.innerText = "✔ [SUCCESS]: টাইম ক্যাপসুল সফলভাবে লক করা হয়েছে! নির্দিষ্ট সময়ে মেইল পৌঁছে যাবে।";
                        statusBox.style.display = "block";
                        form.reset();
                    } else {
                        throw new Error(result.error || "Unknown server response");
                    }
                } else {
                    throw new Error(`Server Status: ${response.status}`);
                }
            } catch (error) {
                console.error("Error:", error);
                statusBox.className = "status-box status-error";
                statusBox.innerText = `❌ [ERROR]: নেটওয়ার্ক রেসপন্স ঠিক নেই (${error.message || "Server Error"})`;
                statusBox.style.display = "block";
            } finally {
                // বাটন আবার সচল করা
                submitBtn.disabled = false;
                submitBtn.innerText = "🚀 CAPSULE ENCRYPT & SAVE";
            }
        });
    </script>
</body>
</html>
