<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSM | Neural Time Capsule</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Fira Code', monospace; background-color: #0a0a16; color: #00ffcc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: #0f0f23; border: 1px solid #05d5fa; border-radius: 12px; padding: 30px; box-shadow: 0 0 25px rgba(5, 213, 250, 0.2); }
        .terminal-header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(5, 213, 250, 0.2); padding-bottom: 15px; }
        .dots { display: flex; gap: 8px; margin-right: 15px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        .title { font-size: 16px; color: #05d5fa; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #a200ff; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #141432; border: 1px solid rgba(5, 213, 250, 0.3); border-radius: 6px; padding: 12px; color: #ffffff; font-family: 'Fira Code', monospace; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
        textarea { resize: vertical; min-height: 120px; }
        .date-time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-submit { width: 100%; background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 15px; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease; }
        .btn-submit:hover { background: #00ffcc; color: #0a0a16; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 6px; font-size: 14px; display: none; border-left: 4px solid; line-height: 1.5; }
        .status-success { background: rgba(39, 201, 63, 0.1); border-color: #27c93f; color: #27c93f; }
        .status-error { background: rgba(255, 95, 86, 0.1); border-color: #ff5f56; color: #ff5f56; }
        .footer { text-align: center; margin-top: 25px; font-size: 11px; color: #6b7280; border-top: 1px solid rgba(5, 213, 250, 0.1); padding-top: 15px; }
        .symbol-bar { color: rgba(5, 213, 250, 0.4); margin-bottom: 8px; letter-spacing: 0.3em; }
        .credit-link { color: #05d5fa; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="terminal-header">
            <div class="dots"><div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div></div>
            <div class="title">root@csm-core:~# send-future-letter</div>
        </div>

        <form id="timeCapsuleForm">
            <div class="form-group">
                <label for="email">ইউজারের ইমেইল (Target Mail)</label>
                <input type="email" id="email" required placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label for="templateType">চিঠির থিম (Theming Architecture)</label>
                <select id="templateType">
                    <option value="default">🌐 Default Neon Engine</option>
                    <option value="birthday">🎂 Future Birthday Core</option>
                    <option value="love">❤️ Future Soulmate Ledger</option>
                    <option value="crypto">🪙 Crypto & Wealth Ledger</option>
                    <option value="target">🎯 Motivation & Target Core</option>
                </select>
            </div>
            <div class="date-time-row">
                <div class="form-group">
                    <label for="sendDate">পাঠানোর তারিখ (Date)</label>
                    <input type="date" id="sendDate" required>
                </div>
                <div class="form-group">
                    <label for="sendTime">পাঠানোর সময় (Time)</label>
                    <input type="time" id="sendTime" required>
                </div>
            </div>
            <div class="form-group">
                <label for="message">ভবিষ্যতের বার্তা (Encrypted Letter)</label>
                <textarea id="message" required placeholder="আপনার ভবিষ্যতের জন্য কিছু লিখে রাখুন..."></textarea>
            </div>
            <button type="submit" class="btn-submit">🚀 Capsule Encrypt & Save</button>
        </form>

        <div id="statusBox" class="status-box"></div>

        <div class="footer">
            <div class="symbol-bar">⚙️ ─── 💾 ─── 🔑 ─── ⏳ ─── 🔒 ─── 🛰️</div>
            <p>System Maintained by <a href="https://github.com/sendfuture" target="_blank" class="credit-link">সিএসএম মহসিন আলম</a></p>
        </div>
    </div>

    <script>
        document.getElementById('timeCapsuleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusBox = document.getElementById('statusBox');
            const submitBtn = document.querySelector('.btn-submit');
            
            const email = document.getElementById('email').value;
            const templateType = document.getElementById('templateType').value;
            const sendDate = document.getElementById('sendDate').value;
            const sendTime = document.getElementById('sendTime').value;
            const message = document.getElementById('message').value;

            const [sendHour, sendMinute] = sendTime.split(':');

            submitBtn.innerText = "⚡ ENCRYPTING & SAVING...";
            submitBtn.disabled = true;
            statusBox.style.display = "none";

            try {
                const response = await fetch('https://sendfuture.netlify.app/.netlify/functions/server', {
                    method: 'POST',
                    mode: 'cors', // CORS ব্লক ভাঙার জন্য বাধ্য করা হলো
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, templateType, sendDate, sendHour, sendMinute, message })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    statusBox.className = "status-box status-success";
                    statusBox.innerText = "✔ [SUCCESS]: টাইম ক্যাপসুল সফলভাবে লক করা হয়েছে! নির্দিষ্ট সময়ে মেইল পৌঁছে যাবে।";
                    statusBox.style.display = "block";
                    document.getElementById('timeCapsuleForm').reset();
                } else {
                    throw new Error(result.error || "সার্ভার ডাটা গ্রহণ করেনি।");
                }
            } catch (error) {
                statusBox.className = "status-box status-error";
                statusBox.innerText = `❌ [ERROR]: ${error.message}`;
                statusBox.style.display = "block";
            } finally {
                submitBtn.innerText = "🚀 CAPSULE ENCRYPT & SAVE";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
